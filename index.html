<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INKU — AnimeJapan 2026 Calendrier</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#D02886;--purple:#54218E;--hot:#FF3399;--soft:#FF5FB3;--lav:#9966CC;--bg:#0A0515;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--red-stage:#FF4757;--green-stage:#2ED573;--blue-stage:#1E90FF;--white-stage:#A0A0B0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:#fff;min-height:100vh;overflow-x:hidden}
::selection{background:var(--pink);color:#fff}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--purple);border-radius:3px}

/* HERO */
.hero{position:relative;padding:40px 24px 32px;text-align:center;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(208,40,134,0.15),rgba(84,33,142,0.25),rgba(30,144,255,0.1));z-index:0}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(to top,var(--bg),transparent);z-index:1}
.hero>*{position:relative;z-index:2}
.hero-logo{font-size:48px;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-2px}
.hero-sub{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-top:4px}
.hero-title{font-size:28px;font-weight:800;margin-top:16px;line-height:1.2}
.hero-title span{background:linear-gradient(135deg,var(--hot),var(--lav));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-info{display:flex;justify-content:center;gap:24px;margin-top:16px;flex-wrap:wrap}
.hero-badge{padding:8px 16px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);display:flex;align-items:center;gap:6px}
.hero-badge .emoji{font-size:16px}

/* TABS */
.tabs{display:flex;justify-content:center;gap:8px;padding:0 24px 24px;position:sticky;top:0;z-index:50;background:linear-gradient(to bottom,var(--bg) 70%,transparent)}
.tab{padding:12px 28px;border:1px solid var(--border);border-radius:12px;background:transparent;color:rgba(255,255,255,0.5);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s}
.tab:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.8)}
.tab.active{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border-color:transparent;box-shadow:0 4px 20px rgba(208,40,134,0.3)}

/* STAGE LEGEND */
.legend{display:flex;justify-content:center;gap:12px;padding:0 24px 20px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.5)}
.legend-dot{width:10px;height:10px;border-radius:3px}

/* TIMELINE */
.timeline{max-width:900px;margin:0 auto;padding:0 24px 60px}
.time-block{margin-bottom:24px;opacity:0;animation:fadeUp .4s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.time-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.time-jp{font-size:11px;font-weight:600;color:rgba(255,255,255,0.25);min-width:90px;text-align:right}
.time-fr{font-size:18px;font-weight:800;color:var(--hot);min-width:60px}
.time-line{flex:1;height:1px;background:var(--border)}

.ev-card{display:flex;gap:14px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;transition:all .3s;overflow:hidden;position:relative}
.ev-card:hover{background:rgba(255,255,255,0.07);transform:translateX(6px);box-shadow:0 6px 30px rgba(0,0,0,0.4)}
.ev-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.ev-card.stage-red::before{background:var(--red-stage)}
.ev-card.stage-green::before{background:var(--green-stage)}
.ev-card.stage-blue::before{background:var(--blue-stage)}
.ev-card.stage-white::before{background:var(--white-stage)}

.ev-img{width:56px;height:78px;border-radius:8px;object-fit:cover;flex-shrink:0;background:linear-gradient(135deg,rgba(208,40,134,0.12),rgba(84,33,142,0.12))}
.ev-img.ph{display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(255,255,255,0.12);text-align:center;padding:4px;word-break:break-word}
.ev-content{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.ev-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.ev-stage{font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;border-radius:4px}
.s-red{background:rgba(255,71,87,0.15);color:var(--red-stage)}
.s-green{background:rgba(46,213,115,0.15);color:var(--green-stage)}
.s-blue{background:rgba(30,144,255,0.15);color:var(--blue-stage)}
.s-white{background:rgba(160,160,176,0.15);color:var(--white-stage)}
.ev-time-badge{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px}
.ev-name{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-desc{font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* FOOTER */
.footer{text-align:center;padding:40px 24px 32px;border-top:1px solid var(--border)}
.footer-logo{font-size:56px;font-weight:900;color:rgba(255,255,255,0.04)}
.footer-text{font-size:11px;color:rgba(255,255,255,0.15);margin-top:8px}

@media(max-width:640px){.hero-logo{font-size:36px}.hero-title{font-size:22px}.ev-card{padding:10px;gap:10px}.ev-img{width:44px;height:62px}.ev-name{font-size:13px}.tabs{gap:4px}.tab{padding:10px 16px;font-size:12px}.time-fr{font-size:15px}.hero-info{gap:8px}.hero-badge{padding:6px 10px;font-size:11px}}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-logo">INKU</div>
  <div class="hero-sub">Media Anime &amp; Manga</div>
  <h1 class="hero-title">Calendrier <span>AnimeJapan 2026</span></h1>
  <div class="hero-info">
    <div class="hero-badge"><span class="emoji">📍</span> Tokyo Big Sight</div>
    <div class="hero-badge"><span class="emoji">📅</span> 28-29 Mars 2026</div>
    <div class="hero-badge"><span class="emoji">🎭</span> 50 Stages</div>
    <div class="hero-badge"><span class="emoji">🇫🇷</span> Heures françaises</div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchDay('sam')">Samedi 28 Mars</button>
  <button class="tab" onclick="switchDay('dim')">Dimanche 29 Mars</button>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--red-stage)"></div>RED Stage</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--green-stage)"></div>GREEN Stage</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--blue-stage)"></div>BLUE Stage</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--white-stage)"></div>WHITE Stage</div>
</div>

<div class="timeline" id="timeline"></div>

<footer class="footer">
  <div class="footer-logo">INKU</div>
  <div class="footer-text">AnimeJapan 2026 &bull; Horaires converties en heure française &bull; Samedi = CET (UTC+1) &bull; Dimanche = CEST (UTC+2)</div>
</footer>

<script>
// SAMEDI 28 Mars: CET (JST - 8h)
// DIMANCHE 29 Mars: CEST (JST - 7h) — changement d'heure dans la nuit du 28 au 29
// Format: [jst_start, jst_end, stage, title, desc, anilist_search]

const SAM = [
// RED STAGE — Samedi 28
["09:35","10:10","red","Oshi no Ko","AnimeJapan 2026 Special Stage","Oshi no Ko"],
["10:55","11:30","red","My Hero Academia × Vigilantes","AnimeJapan Ultra Stage 2026","Boku no Hero Academia"],
["12:15","12:50","red","The Irregular at Magic High School","Yotsuba Succession Edition — Special Stage","Mahouka Koukou no Rettousei"],
["14:15","14:50","red","Demon Slayer: Kimetsu no Yaiba","Infinity Castle — Special Stage","Kimetsu no Yaiba"],
["14:55","15:30","red","Jujutsu Kaisen","Special Stage","Jujutsu Kaisen"],
["15:35","16:10","red","One Piece","AnimeJapan Special Stage","One Piece"],
["17:10","17:45","red","Witch Hat Atelier","L'Atelier des Sorciers — Talk Show","Tongari Boushi no Atelier"],
["17:50","18:25","red","JoJo's: Steel Ball Run","Partie 7 — Special Stage","JoJo no Kimyou na Bouken Part 7: Steel Ball Run"],
// GREEN STAGE — Samedi 28
["09:35","10:10","green","GochiUsa Movie","Is the Order a Rabbit? — Talk Party","Gochuumon wa Usagi Desu ka?"],
["10:15","10:50","green","Mushoku Tensei III","Saison 3 — Special Stage","Mushoku Tensei"],
["10:55","11:30","green","Classroom of the Elite S4","2nd Year Arc — Talk Show","Youkoso Jitsuryoku Shijou Shugi no Kyoushitsu e"],
["11:35","12:10","green","Dorohedoro S2","Saison 2 Netflix — Talk Show","Dorohedoro"],
["12:15","12:50","green","Slime S4","That Time I Got Reincarnated as a Slime — Stage","Tensei shitara Slime Datta Ken"],
["14:15","14:50","green","Dandadan","Special Stage avec cast","Dandadan"],
["14:55","15:30","green","Sakamoto Days","Part 2 — Special Stage","Sakamoto Days"],
["15:35","16:10","green","Dr. Stone: Science Future","Special Stage","Dr. Stone"],
["17:10","17:45","green","Akane-banashi","Saison 1 — Talk Show","Akane-banashi"],
["17:50","18:25","green","Blue Lock","Special Stage — Film & S2","Blue Lock"],
// BLUE STAGE — Samedi 28
["09:35","10:10","blue","Wistoria S2","Saison 2 — Talk Show","Tsue to Tsurugi no Wistoria"],
["10:15","10:50","blue","Mission: Yozakura Family S2","Special Stage","Yozakura-san Chi no Daisakusen"],
["10:55","11:30","blue","Solo Leveling","Arise from the Shadow — Talk Show","Solo Leveling"],
["11:35","12:10","blue","Liar Game","Nouveau anime — Presentation","Liar Game"],
["14:15","14:50","blue","Drops of God","Kami no Shizuku — Talk Show","Kami no Shizuku"],
["14:55","15:30","blue","Daemons of the Shadow Realm","Yomi no Tsugai — Talk Show","Yomi no Tsugai"],
["15:35","16:10","blue","Apothecary Diaries S2","Special Stage","Kusuriya no Hitorigoto"],
// WHITE STAGE — Samedi 28
["09:35","10:10","white","Fist of the North Star","Hokuto no Ken — Talk Show","Hokuto no Ken"],
["10:15","10:50","white","Psyren","Nouveau anime — Presentation","Psyren"],
["10:55","11:30","white","Baki-Dou","Special Stage","Baki"],
["11:35","12:10","white","Black Torch","Nouveau anime — Presentation","Black Torch"],
["14:15","14:50","white","Fire Force S3","Cour 2 — Talk Show","Enen no Shouboutai"],
["14:55","15:30","white","Frieren S2","Preview — Mini Stage","Sousou no Frieren"],
];

const DIM = [
// RED STAGE — Dimanche 29
["09:35","10:10","red","Frieren S2","Beyond Journey's End — Premiere Event","Sousou no Frieren"],
["10:55","11:30","red","Re:ZERO S4","10th Anniversary — Concert & Talk","Re:Zero kara Hajimeru Isekai Seikatsu"],
["12:15","12:50","red","Chainsaw Man","Special Stage","Chainsaw Man"],
["14:15","14:50","red","Kaiju No. 8 S2","Saison 2 — Special Stage","Kaiju No. 8"],
["14:55","15:30","red","Spy x Family","Special Stage — Nouvelle annonce","Spy x Family"],
["15:35","16:10","red","One Piece","Day 2 — Special Stage","One Piece"],
["17:10","17:45","red","Demon Slayer: Infinity Castle","Film — Special Stage","Kimetsu no Yaiba"],
["17:50","18:25","red","Bleach: TYBW Part 4","Annonce — Special Stage","Bleach: Sennen Kessen-hen"],
// GREEN STAGE — Dimanche 29
["09:35","10:10","green","The Eminence in Shadow","Special Stage","Kage no Jitsuryokusha ni Naritakute!"],
["10:15","10:50","green","Mushoku Tensei III","Day 2 — Cast Talk Show","Mushoku Tensei"],
["10:55","11:30","green","Ascendance of a Bookworm S4","Special Stage","Honzuki no Gekokujou"],
["11:35","12:10","green","Marriagetoxin","Nouveau anime — Presentation","Marriagetoxin"],
["14:15","14:50","green","Rascal Does Not Dream","of a Dear Friend — Talk Show","Seishun Buta Yarou"],
["14:55","15:30","green","The Ramparts of Ice","Special Stage","Koori no Jouseki"],
["15:35","16:10","green","Lost Echoes","Film — Special Stage","Lost Echoes"],
["17:10","17:45","green","Re:ZERO S4","Day 2 — Extended Talk Show","Re:Zero kara Hajimeru Isekai Seikatsu"],
// BLUE STAGE — Dimanche 29
["09:35","10:10","blue","Witch Hat Atelier","Day 2 — Extended Talk","Tongari Boushi no Atelier"],
["10:15","10:50","blue","Sakamoto Days","Day 2 — Talk Show","Sakamoto Days"],
["10:55","11:30","blue","Blue Box","Ao no Hako — Special Stage","Ao no Hako"],
["11:35","12:10","blue","Dandadan S2","Annonce Saison 2","Dandadan"],
["14:15","14:50","blue","Tower of God S3","Saison 3 — Talk Show","Kami no Tou"],
["14:55","15:30","blue","Vinland Saga","Special Stage","Vinland Saga"],
// WHITE STAGE — Dimanche 29
["09:35","10:10","white","Kindergarten Wars","Nouveau anime — Presentation","Youchien Sensou"],
["10:15","10:50","white","You and I Are Polar Opposites","Special Stage","Seihantai na Kimi to Boku"],
["10:55","11:30","white","Suikoden: The Anime","Nouveau anime — Presentation","Gensou Suikoden"],
["11:35","12:10","white","Skip and Loafer S2","Saison 2 — Talk Show","Skip to Loafer"],
["14:15","14:50","white","Bocchi the Rock! S2","Annonce — Stage","Bocchi the Rock!"],
["14:55","15:30","white","Dr. Stone","Science Future — Day 2 Talk","Dr. Stone"],
];

function jstToFr(jst, isSunday) {
  const [h,m] = jst.split(':').map(Number);
  const offset = isSunday ? 7 : 8;
  let fh = h - offset;
  if(fh < 0) fh += 24;
  return String(fh).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}

let currentDay = 'sam';
function switchDay(day) {
  currentDay = day;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (day==='sam'?0:1)===i));
  renderTimeline();
}

function renderTimeline() {
  const data = currentDay === 'sam' ? SAM : DIM;
  const isSunday = currentDay === 'dim';
  const tz = isSunday ? 'CEST' : 'CET';
  const container = document.getElementById('timeline');

  // Group by JST start time
  const groups = {};
  data.forEach(ev => {
    if(!groups[ev[0]]) groups[ev[0]] = [];
    groups[ev[0]].push(ev);
  });

  let html = '';
  let delay = 0;
  Object.keys(groups).sort().forEach(jstTime => {
    const frTime = jstToFr(jstTime, isSunday);
    html += `<div class="time-block" style="animation-delay:${delay}ms">`;
    html += `<div class="time-header"><span class="time-jp">JST ${jstTime}</span><span class="time-fr">${frTime} ${tz}</span><div class="time-line"></div></div>`;

    groups[jstTime].forEach(ev => {
      const stageClass = 'stage-' + ev[2];
      const sClass = 's-' + ev[2];
      const stageName = ev[2].toUpperCase();
      const uid = 'i' + Math.random().toString(36).substr(2,7);
      const frEnd = jstToFr(ev[1], isSunday);

      html += `<div class="ev-card ${stageClass}">`;
      html += `<div class="ev-img ph" id="${uid}" data-s="${ev[5]}">${ev[3].substring(0,10)}</div>`;
      html += `<div class="ev-content"><div class="ev-meta"><span class="ev-stage ${sClass}">${stageName}</span><span class="ev-time-badge">${frTime} - ${frEnd}</span></div>`;
      html += `<div class="ev-name">${ev[3]}</div>`;
      html += `<div class="ev-desc">${ev[4]}</div></div></div>`;
    });

    html += '</div>';
    delay += 60;
  });

  container.innerHTML = html;

  // Fetch images from AniList
  const cache = {};
  document.querySelectorAll('.ph').forEach((el, i) => {
    const s = el.dataset.s;
    if(cache[s]){const img=document.createElement('img');img.src=cache[s];img.className='ev-img';img.loading='lazy';el.replaceWith(img);return}
    setTimeout(() => {
      fetch('https://graphql.anilist.co',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:`query($s:String){Media(search:$s,type:ANIME,sort:SEARCH_MATCH){coverImage{medium}}}`,variables:{s}})})
      .then(r=>r.json()).then(d=>{
        const url=d?.data?.Media?.coverImage?.medium;
        if(url){cache[s]=url;const img=document.createElement('img');img.src=url;img.className='ev-img';img.loading='lazy';el.replaceWith(img);
          document.querySelectorAll(`.ph[data-s="${CSS.escape(s)}"]`).forEach(p=>{const c=document.createElement('img');c.src=url;c.className='ev-img';c.loading='lazy';p.replaceWith(c)})
        }
      }).catch(()=>{});
    }, i * 300);
  });
}

renderTimeline();
</script>
</body>
</html>
